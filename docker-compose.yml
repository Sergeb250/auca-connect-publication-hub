services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sergeb250/connect-api-ready:latest
    container_name: connect-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: ${APP_PORT:-8081}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-connectDB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-8}
      CAMPUS_VERIFICATION_MODE: ${CAMPUS_VERIFICATION_MODE:-simple}
      APP_AUTH_PASSWORD_RESET_URL: ${APP_AUTH_PASSWORD_RESET_URL:-http://localhost:3000/reset-password}
      APP_AUTH_PASSWORD_RESET_TOKEN_MINUTES: ${APP_AUTH_PASSWORD_RESET_TOKEN_MINUTES:-10}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-smtp.gmail.com}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-587}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      APP_STORAGE_ENDPOINT: ${SUPABASE_STORAGE_ENDPOINT:-https://yojaqlqoeachnxyoryas.storage.supabase.co/storage/v1/s3}
      APP_STORAGE_REGION: ${SUPABASE_STORAGE_REGION:-eu-west-1}
      APP_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-connect}
      APP_STORAGE_ACCESS_KEY: ${SUPABASE_STORAGE_ACCESS_KEY:-}
      APP_STORAGE_SECRET_KEY: ${SUPABASE_STORAGE_SECRET_KEY:-}
      APP_STORAGE_PATHS_AVATARS: ${SUPABASE_STORAGE_AVATARS_PATH:-profile-avatars}
      APP_STORAGE_PATHS_MEMOIRS: ${SUPABASE_STORAGE_MEMOIRS_PATH:-memoirs}
      APP_STORAGE_PATHS_PUBLICATION_FILES: ${SUPABASE_STORAGE_PUBLICATION_FILES_PATH:-publication-files}
      APP_STORAGE_PATHS_GITHUB_SNAPSHOTS: ${SUPABASE_STORAGE_GITHUB_SNAPSHOTS_PATH:-github-snapshots}
    ports:
      - "${HOST_PORT:-80}:${APP_PORT:-8081}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${APP_PORT:-8081}/actuator/health/readiness >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  db:
    image: postgres:16-alpine
    container_name: connect-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-connectDB}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-connectDB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${POSTGRES_PORT:-5000}:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
