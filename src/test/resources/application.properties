spring.application.name=connect-api
spring.server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5000/connectDB
spring.datasource.username=postgres
spring.datasource.password=1243
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=test-jwt-secret-which-is-long-enough-12345678901234567890
jwt.expiration-hours=8
campus.verification.mode=simple
app.auth.password-reset-url=http://localhost:3000/reset-password
app.auth.password-reset-token-minutes=10

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@example.com
spring.mail.password=test-app-password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.cache.type=simple
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100
