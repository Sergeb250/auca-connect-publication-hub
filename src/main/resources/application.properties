spring.config.import=optional:file:.env[.properties]

spring.application.name=connect-api
server.port=${PORT:${SERVER_PORT:8081}}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5000/connectDB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:test-jwt-secret-which-is-long-enough-12345678901234567890}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}
campus.verification.mode=${CAMPUS_VERIFICATION_MODE:simple}
app.auth.password-reset-url=${APP_AUTH_PASSWORD_RESET_URL:http://localhost:3000/reset-password}
app.auth.password-reset-token-minutes=${APP_AUTH_PASSWORD_RESET_TOKEN_MINUTES:10}

# Email Configuration (Gmail)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SSL_TRUST:${SPRING_MAIL_HOST:smtp.gmail.com}}

spring.cache.type=simple
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
